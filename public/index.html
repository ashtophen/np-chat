<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>np-chat</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

      #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: absolute; bottom: 0; left: 0; width: 100%; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
      #input { border: none; background: #efefef; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
      #input:focus { outline: none; }
      #form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; }

      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages > li { padding: 0.5rem 1rem; }
      #messages > li:nth-child(odd) { background: #efefef; }
    </style>
    <link href="./src/styles/tailwind.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="./favicon.ico">
  </head>
  <body >
    <div id="login-scrn" class="bg-stone-900 fixed top-0 left-0 h-dvh w-dvw z-20 flex items-center justify-center" style="z-index: 20;">
      <div id="login-window" class="h-3/5 min-w-md w-2/5 bg-slate-700 rounded-lg flex flex-col items-center shadow-lg relative">
        <h1 class="text-3xl text-shadow-lg text-gray-100 pt-3">NP-chat</h1>
        <h1 id="login-signup-title" class="text-2xl text-shadow-lg text-gray-100 p-2 mb-8">Login</h1>
        <form id="login-form" class="flex flex-col justify-center w-80">
          <div class="flex flex-col justify-center w-full">
          <div class="flex flex-col w-full justify-center mb-3">
            <div class="w-full">
              <h1 id="username-label"class="text-left text-gray-100 pl-3">username/email:</h1>
            </div>
            <input id="username-field" name="username" minlength="3" class="border-2 border-slate-700 user-invalid:border-red-500 user-valid:border-green-500 bg-white rounded-md m-2 p-1" required/>
          </div>
          <div id="email-block" class="hidden flex flex-col w-full justify-center mb-3">
            <div class="w-full">
              <h1 class="text-left text-gray-100 pl-3">email:</h1>
            </div>
            <input id="email-field" name="email" type="email" class="bg-white rounded-md m-2 p-1 border-2 border-slate-700 user-invalid:border-red-500 user-valid:border-green-500" disabled/>
          </div>
          <div id="password-block"class="flex flex-col justify-center mb-3">
            <div class="w-full">
              <h1 class="pl-3 text-gray-100">password:</h1>
            </div>
            <input id="password-field" name="password" type="password" minlength="8" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number, one uppercase, and one lowercase letter, and at least 8 characters" class="bg-white rounded-md m-2 p-1 border-2 border-slate-700 user-invalid:border-red-500 user-valid:border-green-500" required autocomplete="current-password"/>
          </div>
          <div id="password-check-block"class="hidden flex flex-col justify-center">
            <div class="w-full">
              <h1 class="pl-3 text-gray-100">re-enter password:</h1>
            </div>
            <input id="password-check-field" name="password-chk"type="password" class="bg-white rounded-md m-2 p-1 border-2 border-slate-700 user-invalid:border-red-500 user-valid:border-green-500" disabled/>
          </div>
        </div>
        <div class="p-3 flex items-center">
        <input type="checkbox" id="remember-checkbox" class="w-[30px] h-[30px]">
        <label class="text-gray-100 pl-3" for="remember">Remember Me.</label>
      </div>
          <input class="p-2 bg-slate-400 w-full rounded-lg" type="submit" id="submit" value="enter">
        </form>
      </div>
      <button id="signup/login-btn" class="absolute bottom-0 text-xl shadow-lg text-white-400 m-4 p-2 bg-slate-400 rounded-lg select-none hover:bg-slate-500 active:bg-slate-300 active:scale-90">Sign Up</button>
    </div>


    <!-- Use h-dvh for dynamic viewport height -->
<div class="flex flex-col h-dvh overflow-hidden"> 
    <!-- Top Bar -->
    <div class="bg-slate-900 h-[32px] w-full flex-none"></div> 
  
    <!-- Grid Container: Use flex-1 to fill remaining height -->
    <div class="grid grid-cols-[64px_200px_1fr_100px] flex-1 min-h-0"> 
      <div class="bg-slate-900 h-full flex justify-center">
        <ul id="servers" class="flex flex-col overflow-y-auto"></ul>
      </div>
      <div class="bg-slate-700 h-full"></div>
      <div class="relative flex flex-col h-full overflow-y-auto pb-[3rem]">
        <!-- Message list needs to grow and scroll -->
        <ul id="messages" class="flex-1 flex flex-col-reverse overflow-y-auto"></ul> 
        <form id="form" class=" p-4 border-t border-slate-700 z-10">
          <input id="input" class="w-full" autocomplete="off" />
          <button>Send</button>
        </form>
      </div>
      <div class="bg-slate-800 h-full"></div>
    </div>
  </div>
  
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="./src/messaging.js"></script>
    <script src="./src/servers.js"></script>
    <script src="./src/login.js"></script>
  </body>
</html>
